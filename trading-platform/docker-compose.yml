services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    # RDB 스냅샷 + 볼륨 = 재배포·재부팅해도 데이터 유지(포워드 로그·매매일지·자산
    # 히스토리 등 '시간이 쌓여야 의미 있는' 데이터가 매 빌드마다 초기화되던 문제 해결).
    # save 300 10 / 60 10000 = 5분내 10건 or 1분내 1만건 변경 시 dump.rdb 저장(+종료 시 저장).
    # AOF 대신 RDB — SD카드 쓰기 마모를 줄이면서 재배포 생존 목적엔 충분(하드 크래시 시 마지막 몇 분만 손실).
    command: ["redis-server", "--dir", "/data",
              "--save", "300", "10", "--save", "60", "10000", "--appendonly", "no"]
    volumes:
      - redis-data:/data
    mem_limit: 256m

  collector:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "collector.main"]
    depends_on:
      - redis
    mem_limit: 512m

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      # 호스트 포트는 API_PORT(.env)로 변경 가능. 8000이 점유된 환경(OMV 등) 대비 기본 8090.
      - "${API_PORT:-8090}:8000"
    depends_on:
      - redis
    mem_limit: 512m

  dart:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "collector.news.main"]
    depends_on:
      - redis
    mem_limit: 256m

  research:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "research.main"]
    depends_on:
      - redis
    mem_limit: 256m

  briefing:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "briefing.main"]
    depends_on:
      - redis
    mem_limit: 256m

  # 매매 엔진: 1시간 주기 리스크 실드(MDD·현금·한도) + 2단계 필터 매수리스트.
  # 주문은 내지 않음 — 수동 주문 API의 게이트/알림/리스트만 담당.
  engine:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "engine.main"]
    depends_on:
      - redis
    mem_limit: 256m

# Redis 영속 데이터(dump.rdb) — 재배포·재부팅해도 유지. 지우려면 `docker volume rm`.
volumes:
  redis-data:
