services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    mem_limit: 256m

  collector:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "collector.main"]
    depends_on:
      - redis
    mem_limit: 512m

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      # 호스트 포트는 API_PORT(.env)로 변경 가능. 8000이 점유된 환경(OMV 등) 대비 기본 8090.
      - "${API_PORT:-8090}:8000"
    depends_on:
      - redis
    mem_limit: 512m

  notifier:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "notifier.main"]
    depends_on:
      - redis
    mem_limit: 256m

  announcer:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "notifier.announce_main"]
    depends_on:
      - redis
    mem_limit: 256m
