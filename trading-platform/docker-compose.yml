services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    mem_limit: 256m

  collector:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "collector.main"]
    depends_on:
      - redis
    mem_limit: 512m

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      # 호스트 포트는 API_PORT(.env)로 변경 가능. 8000이 점유된 환경(OMV 등) 대비 기본 8090.
      - "${API_PORT:-8090}:8000"
    depends_on:
      - redis
    mem_limit: 512m

  dart:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "collector.news.main"]
    depends_on:
      - redis
    mem_limit: 256m

  research:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "research.main"]
    depends_on:
      - redis
    mem_limit: 256m

  briefing:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "briefing.main"]
    depends_on:
      - redis
    mem_limit: 256m

  # 매매 엔진: 1시간 주기 리스크 실드(MDD·현금·한도) + 2단계 필터 매수리스트.
  # 주문은 내지 않음 — 수동 주문 API의 게이트/알림/리스트만 담당.
  engine:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "engine.main"]
    depends_on:
      - redis
    mem_limit: 256m
