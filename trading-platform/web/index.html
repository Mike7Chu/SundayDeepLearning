<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>아비트라지 대시보드</title>
<style>
  :root {
    --bg:#0e1116; --panel:#161b22; --line:#30363d; --text:#e6edf3; --muted:#8b949e;
    --up:#f85149; --down:#58a6ff; --green:#3fb950; --gray:#6e7681; --badge:#d29922;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size:15px;
    -webkit-font-smoothing:antialiased; }
  header { position:sticky; top:0; background:var(--panel);
    border-bottom:1px solid var(--line); padding:10px 14px; z-index:10; }
  h1 { margin:0 0 8px; font-size:15px; }
  .tabs { display:flex; gap:6px; margin-bottom:8px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .tabs button { background:var(--bg); color:var(--muted); border:1px solid var(--line);
    border-radius:8px; padding:8px 15px; font-size:14px; cursor:pointer; white-space:nowrap; min-height:38px; }
  .tabs button.active { color:var(--text); border-color:var(--green); background:#11331f; }
  .controls { display:flex; flex-wrap:wrap; gap:6px 10px; align-items:center; }
  select, input { background:var(--bg); color:var(--text); border:1px solid var(--line);
    border-radius:6px; padding:5px 7px; font-size:13px; }
  input.search { width:104px; }
  input.rng { width:60px; }
  label.chk { color:var(--muted); font-size:12px; display:inline-flex; align-items:center; gap:3px; }
  .excl { display:flex; flex-wrap:wrap; gap:4px 10px; padding:6px 0 0; }
  .meta { color:var(--muted); font-size:12px; margin-left:auto; text-align:right; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; }
  .live{background:var(--green);} .stale{background:var(--badge);} .err{background:var(--up);}
  .summary { padding:8px 14px; color:var(--muted); border-bottom:1px solid var(--line); font-size:12px; }
  table { width:100%; border-collapse:collapse; }
  th,td { padding:11px 12px; text-align:right; border-bottom:1px solid var(--line); white-space:nowrap; font-size:14px; }
  th:first-child, td:first-child { text-align:left; }
  th { color:var(--muted); font-weight:600; font-size:12px; cursor:pointer; user-select:none;
    letter-spacing:.2px; background:var(--bg); }
  th[data-sort]:hover, th.exh:hover { color:var(--text); }
  th .arrow { color:var(--green); font-weight:800; }
  tbody tr { transition:background .1s; }
  tbody tr:hover { background:#1c2128; }
  .coin{font-weight:700; font-size:15px; display:inline-flex; align-items:center;}
  .pos{color:var(--up);} .neg{color:var(--down);}
  .num{font-variant-numeric:tabular-nums; color:var(--muted);}
  .prem{font-weight:700; font-variant-numeric:tabular-nums;}
  .empty{padding:40px; text-align:center; color:var(--muted);}
  .panel{display:none;} .panel.active{display:block;}
  .scroll{overflow-x:auto; -webkit-overflow-scrolling:touch;}
  .vscroll{overflow:auto; -webkit-overflow-scrolling:touch; max-height:340px;}
  .vscroll thead th{position:sticky; top:0; background:var(--panel); z-index:2;}
  /* 코인 아이콘 / 거래소 색상 점 */
  .cico{width:18px; height:18px; border-radius:50%; margin-right:6px; vertical-align:middle; background:#222; flex:none;}
  .exdot{display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:5px; vertical-align:middle; flex:none;}
  .card{border:1px solid var(--line); border-radius:10px; margin:10px 14px; padding:12px;
    display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .legs{display:flex; flex-direction:column; gap:6px;}
  .leg{display:flex; align-items:center; gap:8px;}
  .pill{border:1px solid var(--line); border-radius:6px; padding:2px 8px; font-size:12px; color:var(--muted);}
  .pill.perp{color:#d2a8ff; border-color:#6e40c9;}
  .side-long{color:var(--green); font-weight:700;} .side-short{color:var(--up); font-weight:700;}
  .sym{font-weight:700;} .legprice{color:var(--muted); font-variant-numeric:tabular-nums;}
  .right{text-align:right; min-width:90px;} .gap{font-size:18px; font-weight:800; color:var(--green);}
  .fund{font-size:11px; color:var(--muted);}
  .wallet{display:inline-flex; gap:3px; margin-left:6px;}
  .lo{color:var(--green);} .hi{color:var(--up);}
  .cell-int{font-size:10px; color:var(--badge); margin-left:3px;} .cd{font-size:10px; color:var(--muted);}
  .mg{font-size:10px; margin-left:4px; padding:1px 4px; border-radius:4px; border:1px solid var(--line);}
  .mg.ok{color:var(--green); border-color:var(--green);} .mg.no{color:var(--up);} .mg.unk{color:var(--gray);}
  .btn{background:var(--bg); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:8px 13px; font-size:13px; cursor:pointer; min-height:34px;}
  .btn:hover{border-color:var(--green);} .btn:active{background:#1c2128;}
  .clk{cursor:pointer; text-decoration:underline dotted; text-underline-offset:3px;}
  .clk:hover{color:var(--green);}
  .modal{position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:50; display:flex;
    align-items:flex-start; justify-content:center; overflow:auto; padding:24px 12px;}
  .modal-box{background:var(--panel,#0f1115); border:1px solid var(--line); border-radius:12px;
    width:100%; max-width:860px; padding:16px;}
  .modal-head{display:flex; justify-content:space-between; align-items:center; font-size:18px;
    font-weight:700; margin-bottom:12px;}
  .cgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px;}
  .ccard{border:1px solid var(--line); border-radius:8px; padding:10px; background:var(--bg);}
  .ccard .ex{font-weight:600;} .ccard .mk{font-size:11px; color:var(--muted);}
  .ccard .pr{font-size:17px; font-weight:700; margin:4px 0;}
  .ccard .sub{font-size:11px; color:var(--muted);}
  .modal-sec{font-size:13px; color:var(--muted); margin:12px 0 6px; border-top:1px solid var(--line); padding-top:8px;}
  .wgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; margin-top:8px;}
  .wcard{border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:13px;}
  .rbox{margin:14px; border:1px solid var(--line); border-radius:8px; padding:14px; background:var(--bg);}
  .rhead{font-weight:600; margin-bottom:8px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .rwhen{color:var(--muted); font-size:12px; font-weight:400;}
  .rbody{white-space:pre-wrap; font-family:inherit; font-size:13px; line-height:1.6; margin:0; color:var(--text);}
  .rdisc{margin-top:10px; color:var(--muted); font-size:11px; border-top:1px solid var(--line); padding-top:8px;}
  .aset{padding:14px; max-width:560px;}
  .aset h3{font-size:13px; color:var(--muted); margin:16px 0 6px; border-top:1px solid var(--line); padding-top:12px;}
  .arow{display:flex; flex-wrap:wrap; gap:10px 16px; align-items:center; margin-bottom:6px;}
  .arow label{font-size:13px; color:var(--text);}
  .chk.big{font-size:15px; font-weight:700;}
  .ccard .ex{display:flex; align-items:center;}
  @media (max-width:640px){
    body{font-size:14px;}
    th,td{padding:10px 8px; font-size:13.5px;}
    .coin{font-size:14px;}
    .card{margin:8px; padding:11px;}
    .gap{font-size:16px;}
    input.search{width:92px;}
    .cgrid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
    .modal-box{padding:12px;}
  }
</style>
</head>
<body>
<header>
  <h1>📊 아비트라지 대시보드</h1>
  <div class="tabs">
    <button data-tab="kimp" class="active">김프</button>
    <button data-tab="arb">아비트라지</button>
    <button data-tab="funding">펀비</button>
    <button data-tab="bots">봇</button>
    <button data-tab="stocks">주식</button>
    <button data-tab="alerts">알림설정</button>
  </div>
  <div class="controls">
    <span class="ctl" data-for="kimp">기준 <select id="base"></select></span>
    <span class="ctl" data-for="kimp">비교 <select id="ref"></select></span>
    <span class="ctl" data-for="kimp"><select id="kimpBasis">
      <option value="tether">테더김프</option><option value="coin">코인(환율)</option></select></span>
    <span class="ctl" data-for="kimp">범위
      <input class="rng" id="kimpMin" type="number" step="0.1" placeholder="최소%">~
      <input class="rng" id="kimpMax" type="number" step="0.1" placeholder="최대%"></span>
    <span class="ctl" data-for="kimp">거래대금 ≥ <input class="rng" id="kimpVol" type="number" step="1" placeholder="억원"></span>

    <span class="ctl" data-for="arb">갭
      <input class="rng" id="minGap" type="number" step="0.1" value="0.5" placeholder="최소%">~
      <input class="rng" id="maxGap" type="number" step="0.1" placeholder="최대%"></span>
    <span class="ctl" data-for="arb">
      <label class="chk"><input type="checkbox" id="arbSpot" checked>현물</label>
      <label class="chk"><input type="checkbox" id="arbPerp" checked>선물</label></span>
    <span class="ctl" data-for="arb">거래대금 ≥ <input class="rng" id="minVol" type="number" step="100000" placeholder="USDT"></span>
    <span class="ctl" data-for="arb">순스프 ≥ <input class="rng" id="minNet" type="number" step="0.1" placeholder="%"></span>
    <span class="ctl" data-for="arb"><label class="chk" title="현물을 숏하려면 마진(차입)이 필요"><input type="checkbox" id="arbMarginShort" checked>현물숏 마진만</label></span>

    <span class="ctl" data-for="funding">주기 <select id="fundInt">
      <option value="">모두</option><option value="8">8H</option><option value="4">4H</option>
      <option value="2">2H</option><option value="1">1H</option><option value="none">주기없음</option></select></span>
    <span class="ctl" data-for="funding">정렬 <select id="fundSort">
      <option value="abs">|펀비|↓</option><option value="desc">펀비↓</option><option value="asc">펀비↑</option></select></span>
    <span class="ctl" data-for="funding"><label class="chk"><input type="checkbox" id="apyToggle">APY</label></span>

    <span class="ctl" data-for="stocks">보기 <select id="stockView">
      <option value="quote">시세</option><option value="value">가치</option>
      <option value="signal">시그널</option><option value="dividend">배당</option></select></span>

    <span class="ctl" data-for="bots"><button id="killBtn" class="btn">⛔ 킬스위치</button></span>

    <input class="search" id="search" placeholder="코인 검색" />
    <div class="meta">
      <div><span id="status" class="dot err"></span><span id="statusText">연결 중…</span></div>
      <div id="metaInfo">-</div>
    </div>
  </div>
  <!-- 아비트라지: 거래소 제외 -->
  <div class="excl ctl" data-for="arb" id="arbExcl"></div>
</header>

<div id="summary" class="summary" style="display:none"></div>

<div id="panel-kimp" class="panel active">
  <table>
    <thead><tr>
      <th data-sort="coin">코인</th><th data-sort="prem">김프 %</th>
      <th data-sort="perp">선물김프 %</th><th data-sort="basis">현선 %</th>
      <th>국내가(KRW)</th><th>해외현물가</th><th>해외선물가</th><th data-sort="vol">거래대금(억)</th></tr></thead>
    <tbody id="kimpRows"><tr><td colspan="8" class="empty">불러오는 중…</td></tr></tbody>
  </table>
</div>

<div id="panel-arb" class="panel"><div id="arbCards"><div class="empty">불러오는 중…</div></div></div>

<div id="panel-funding" class="panel"><div class="scroll"><table>
  <thead><tr id="fundHead"><th>코인</th></tr></thead>
  <tbody id="fundRows"><tr><td class="empty">불러오는 중…</td></tr></tbody>
</table></div></div>

<div id="panel-bots" class="panel"><div id="botsBox"><div class="empty">불러오는 중…</div></div></div>

<div id="panel-stocks" class="panel">
  <div id="stockBox" class="scroll"><div class="empty">불러오는 중…</div></div>
  <div id="btResult" class="rbox" style="display:none"></div>
  <div id="researchBox" class="rbox" style="display:none"></div>
</div>

<div id="panel-alerts" class="panel">
  <div class="aset">
    <label class="chk big"><input type="checkbox" id="aEnabled"> 🔔 알림 마스터 ON</label>
    <h3>알림 종류</h3>
    <div class="arow">
      <label class="chk"><input type="checkbox" id="tKimpHigh"> 김프</label>
      <label class="chk"><input type="checkbox" id="tKimpLow"> 역프</label>
      <label class="chk"><input type="checkbox" id="tHyeonseon"> 현선</label>
      <label class="chk"><input type="checkbox" id="tFundApy"> 펀비과열</label>
      <label class="chk"><input type="checkbox" id="tFundSpread"> 펀비차</label>
    </div>
    <h3>임계치</h3>
    <div class="arow">
      <label>김프 ≥ <input class="rng" id="aHigh" type="number" step="0.1">%</label>
      <label>역프 ≤ <input class="rng" id="aLow" type="number" step="0.1">%</label>
      <label>현선 ≤ <input class="rng" id="aHyeon" type="number" step="0.1">%</label>
    </div>
    <div class="arow">
      <label>펀비APY ≥ <input class="rng" id="aApy" type="number" step="1">%</label>
      <label>펀비차 ≥ <input class="rng" id="aSpread" type="number" step="0.01">%p</label>
    </div>
    <h3>빈도·제외</h3>
    <div class="arow">
      <label>쿨다운 <input class="rng" id="aCool" type="number" step="10">초</label>
      <label>최소유지 <input class="rng" id="aHold" type="number" step="1">초</label>
      <label>최소거래대금 <input class="rng" id="aVol" type="number" step="1">억원</label>
    </div>
    <div class="arow">
      <label style="flex:1">제외코인(쉼표) <input id="aExcl" style="width:60%" placeholder="예: PEPE, DOGE"></label>
    </div>
    <div class="arow"><button id="aSave" class="btn">💾 저장</button><span id="aMsg" class="fund"></span></div>
  </div>
</div>

<!-- 코인 상세 모달 -->
<div id="coinModal" class="modal" style="display:none">
  <div class="modal-box">
    <div class="modal-head"><span id="cmTitle">코인</span>
      <button class="btn" onclick="closeCoin()">✕ 닫기</button></div>
    <div id="cmBody"><div class="empty">불러오는 중…</div></div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const fmt = (n) => Number(n).toLocaleString("ko-KR",{maximumFractionDigits:2});
const fmt4 = (n) => Number(n).toLocaleString("ko-KR",{maximumFractionDigits:4});
let activeTab="kimp", busy=false;
let kimpSort={key:"prem", dir:-1};       // dir: -1 내림차순
let fundColSort={ex:null, dir:-1};       // 펀비: 특정 거래소 컬럼 정렬
const term = () => $("search").value.trim().toUpperCase();
const matchCoin = (c) => { const t=term(); return !t || c.toUpperCase().includes(t); };
const numOr = (id, dflt) => { const v=parseFloat($(id).value); return isNaN(v)?dflt:v; };

// 코인 아이콘(coincap CDN, 없으면 숨김) + 코인명
function coinIcon(sym){
  const s=(sym||"").split("/")[0].trim().toLowerCase();
  return `<img class="cico" loading="lazy" src="https://assets.coincap.io/assets/icons/${s}@2x.png" onerror="this.style.display='none'">`;
}
const coinLabel=(sym)=> coinIcon(sym)+sym;
// 거래소 브랜드 색상 점
const EXC={upbit:"#1763f6",bithumb:"#f37321",binance:"#f0b90b",bybit:"#f7a600",mexc:"#00b897",
  bitget:"#00c7d4",gate:"#cf0a2c",bingx:"#2954fe",okx:"#7b61ff",coinbase:"#1652f0",kraken:"#7b5be6"};
const exDot=(ex)=>`<span class="exdot" style="background:${EXC[ex]||'#6e7681'}"></span>`;
const exLabel=(ex)=> exDot(ex)+ex;

function setStatus(cls,text){ $("status").className="dot "+cls; $("statusText").textContent=text; }
function fillSelect(sel,names,def){ sel.innerHTML="";
  names.forEach(n=>{const o=document.createElement("option");o.value=n;o.textContent=n;
    if(n===def)o.selected=true; sel.appendChild(o);}); }

async function init(){
  const d = await (await fetch("/exchanges")).json();
  fillSelect($("base"), d.domestic, "upbit");
  fillSelect($("ref"), d.overseas, "binance");
  // 아비트라지 거래소 제외 체크박스
  $("arbExcl").innerHTML = "제외: " + d.overseas.map(e=>
    `<label class="chk"><input type="checkbox" class="exEx" value="${e}">${e}</label>`).join("");
  $("arbExcl").querySelectorAll(".exEx").forEach(el=> el.addEventListener("change", tick));
  document.querySelectorAll(".tabs button").forEach(b=> b.onclick=()=>switchTab(b.dataset.tab));
  document.querySelectorAll("#panel-kimp th[data-sort]").forEach(th=>
    th.onclick=()=>{ const k=th.dataset.sort;
      kimpSort = (kimpSort.key===k)?{key:k,dir:-kimpSort.dir}:{key:k,dir:-1}; tick(); });
  document.querySelectorAll("input,select").forEach(el=> el.addEventListener("input", tick));
  $("fundSort").addEventListener("change", ()=>{ fundColSort={ex:null,dir:-1}; });  // 드롭다운 쓰면 컬럼정렬 해제
  $("aSave").onclick = saveAlerts;
  // 검색창 Enter → 해당 코인 상세, 모달 바깥 클릭 시 닫기
  $("search").addEventListener("keydown", e=>{ if(e.key==="Enter"){ const t=term(); if(t) openCoin(t); }});
  $("coinModal").addEventListener("click", e=>{ if(e.target.id==="coinModal") closeCoin(); });
  document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeCoin(); });
  $("killBtn").onclick = async ()=>{ const d=await (await fetch("/bots")).json();
    await fetch(`/bots/killswitch/${d.killswitch?0:1}`,{method:"POST"}); tick(); };
  switchTab("kimp");
  setInterval(tick, 3000);
}
window.toggleBot = async (name,on)=>{ await fetch(`/bots/${name}/${on?"enable":"disable"}`,{method:"POST"}); tick(); };

function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("active",p.id==="panel-"+tab));
  document.querySelectorAll(".ctl").forEach(c=>c.style.display=(c.dataset.for===tab)?"":"none");
  $("summary").style.display="none";
  if(tab==="alerts") loadAlerts(); else tick();
}

async function loadAlerts(){
  try{
    const s = await (await fetch("/alerts/settings")).json();
    $("aEnabled").checked=s.enabled;
    $("tKimpHigh").checked=s.types.kimp_high; $("tKimpLow").checked=s.types.kimp_low;
    $("tHyeonseon").checked=s.types.hyeonseon; $("tFundApy").checked=s.types.funding_apy;
    $("tFundSpread").checked=s.types.funding_spread;
    $("aHigh").value=s.premium_high_pct; $("aLow").value=s.premium_low_pct;
    $("aHyeon").value=s.hyeonseon_low_pct; $("aApy").value=s.funding_apy_pct;
    $("aSpread").value=s.funding_spread_pct; $("aCool").value=s.cooldown_sec;
    $("aHold").value=s.min_hold_sec; $("aVol").value=s.min_volume_eokwon;
    $("aExcl").value=(s.exclude_coins||[]).join(", ");
    setStatus("live","설정 로드됨");
  }catch(e){ setStatus("err","오류: "+e.message); }
}

async function saveAlerts(){
  const patch={
    enabled:$("aEnabled").checked,
    types:{ kimp_high:$("tKimpHigh").checked, kimp_low:$("tKimpLow").checked,
      hyeonseon:$("tHyeonseon").checked, funding_apy:$("tFundApy").checked, funding_spread:$("tFundSpread").checked },
    premium_high_pct:parseFloat($("aHigh").value), premium_low_pct:parseFloat($("aLow").value),
    hyeonseon_low_pct:parseFloat($("aHyeon").value), funding_apy_pct:parseFloat($("aApy").value),
    funding_spread_pct:parseFloat($("aSpread").value), cooldown_sec:parseInt($("aCool").value),
    min_hold_sec:parseInt($("aHold").value), min_volume_eokwon:parseFloat($("aVol").value)||0,
    exclude_coins:$("aExcl").value.split(",").map(x=>x.trim().toUpperCase()).filter(Boolean),
  };

async function tick(){
  if(busy) return; busy=true;
  try {
    if(activeTab==="kimp") await renderKimp();
    else if(activeTab==="arb") await renderArb();
    else if(activeTab==="funding") await renderFunding();
    else if(activeTab==="bots") await renderBots();
    else if(activeTab==="stocks") await renderStocks();

async function renderKimp(){
  const basis=$("kimpBasis").value;
  const pv=(c)=> basis==="tether"?c.premium_pct:c.premium_coin_pct;
  const ppv=(c)=> basis==="tether"?c.premium_perp_pct:c.premium_perp_coin_pct;  // 선물김프(null 가능)
  // 현선 베이시스: 해외 현물↔선물 가격차%(환산 무관, perp 없으면 null)
  const bv=(c)=> (c.ref_perp_price_krw!=null && c.ref_price_krw>0)
    ? (c.ref_perp_price_krw/c.ref_price_krw - 1)*100 : null;
  const mn=numOr("kimpMin",-Infinity), mx=numOr("kimpMax",Infinity);
  const minVolKrw=numOr("kimpVol",0)*1e8;   // 억원 → 원
  const d = await (await fetch(`/premium?base=${$("base").value}&ref=${$("ref").value}`)).json();
  let rows=(d.rows||[]).filter(c=>matchCoin(c.coin)).filter(c=>pv(c)>=mn && pv(c)<=mx)
    .filter(c=> minVolKrw<=0 || (c.base_volume_krw!=null && c.base_volume_krw>=minVolKrw));
  const skey=(c)=> kimpSort.key==="perp"?(ppv(c)??-9999):kimpSort.key==="basis"?(bv(c)??-9999)
    :kimpSort.key==="vol"?(c.base_volume_krw??-1):(kimpSort.key==="coin"?null:pv(c));
  rows.sort((a,b)=> kimpSort.key==="coin"
    ? kimpSort.dir*a.coin.localeCompare(b.coin) : kimpSort.dir*(skey(a)-skey(b)));
  const LBL={coin:"코인",prem:"김프 %",perp:"선물김프 %",basis:"현선 %",vol:"거래대금(억)"};
  document.querySelectorAll("#panel-kimp th[data-sort]").forEach(th=>{
    th.innerHTML = LBL[th.dataset.sort] + (kimpSort.key===th.dataset.sort?` <span class="arrow">${kimpSort.dir<0?"↓":"↑"}</span>`:"");
  });
  const tb=$("kimpRows");
  if(!rows.length){ tb.innerHTML='<tr><td colspan="8" class="empty">조건에 맞는 코인 없음</td></tr>'; setStatus("stale","-"); return; }
  const pct=(x)=> x==null?'<td class="num">-</td>':`<td class="prem ${x>=0?"pos":"neg"}">${x>=0?"+":""}${x.toFixed(2)}%</td>`;
  tb.innerHTML = rows.map(c=>{const v=pv(c),cls=v>=0?"pos":"neg",s=v>=0?"+":"";
    const vol=(c.base_volume_krw!=null)?fmt(c.base_volume_krw/1e8):"-";
    const perpPrice=(c.ref_perp_price_krw!=null)?fmt(c.ref_perp_price_krw):"-";
    return `<tr><td class="coin clk" onclick="openCoin('${c.coin}')">${coinLabel(c.coin)}</td><td class="prem ${cls}">${s}${v.toFixed(2)}%</td>
      ${pct(ppv(c))}${pct(bv(c))}
      <td class="num">${fmt(c.base_price_krw)}</td><td class="num">${fmt(c.ref_price_krw)}</td>
      <td class="num">${perpPrice}</td><td class="num">${vol}</td></tr>`;}).join("");
  $("metaInfo").textContent=`${rows.length}코인 · ${basis==="tether"?"테더김프":"코인(환율)"} · 환율 ${fmt(rows[0].forex_rate)} · 테더 ${fmt(rows[0].tether_rate)}`;
  setStatus("live","실시간");
}

function legHtml(leg, side){
  const mk = leg.market==="perp"?'<span class="pill perp">선물</span>':'<span class="pill">현물</span>';
  const sd = side==="long"?'<span class="side-long">롱</span>':'<span class="side-short">숏</span>';
  let w="";
  if(leg.wallet){ const dot=(v)=>`<span class="dot" style="background:${v===true?'var(--green)':v===false?'var(--up)':'var(--gray)'}"></span>`;
    w=`<span class="wallet" title="입금/출금">${dot(leg.wallet.deposit)}${dot(leg.wallet.withdraw)}</span>`; }
  const v = leg.volume ? ` <span class="fund">$${fmtVol(leg.volume)}</span>` : "";
  // 현물 숏은 마진(차입) 필요 → 마진 가능여부 표시
  let mg="";
  if(leg.market==="spot" && side==="short"){
    mg = leg.margin===true?'<span class="mg ok">마진O</span>'
       : leg.margin===false?'<span class="mg no">마진X</span>'
       : '<span class="mg unk">마진?</span>';
  }
  return `<div class="leg">${mk}${sd}<span class="sym">${exDot(leg.exchange)}${leg.exchange}</span><span class="legprice">${fmt4(leg.price)}</span>${v}${mg}${w}</div>`;
}
function fmtVol(n){ n=Number(n); if(n>=1e9)return (n/1e9).toFixed(1)+"B"; if(n>=1e6)return (n/1e6).toFixed(1)+"M"; if(n>=1e3)return (n/1e3).toFixed(0)+"k"; return n.toFixed(0); }
function fundLine(leg){ if(!leg.funding) return "";
  const iv=leg.funding.interval_h?`${leg.funding.interval_h}H`:"";
  return `<div class="fund">펀비 ${leg.funding.rate_pct.toFixed(4)}% ${iv}</div>`; }

async function renderArb(){
  const minG=numOr("minGap",0), maxG=numOr("maxGap",Infinity);
  const useSpot=$("arbSpot").checked, usePerp=$("arbPerp").checked;
  const excl=new Set([...document.querySelectorAll(".exEx:checked")].map(e=>e.value));
  const minVol=numOr("minVol",0);
  const minNet=numOr("minNet",-Infinity);
  const marginShort=$("arbMarginShort").checked;
  const d = await (await fetch(`/arbitrage?min_gap=0&min_volume=${minVol}&limit=400`)).json();
  let rows=(d.rows||[]).filter(x=>matchCoin(x.coin))
    .filter(x=>x.gap_pct>=minG && x.gap_pct<=maxG)
    .filter(x=> (x.net_gap_pct??x.gap_pct) >= minNet)
    .filter(x=>{ const ms=[x.long.market,x.short.market];
      if(!useSpot && ms.includes("spot")) return false;
      if(!usePerp && ms.includes("perp")) return false;
      if(excl.has(x.long.exchange)||excl.has(x.short.exchange)) return false;
      // 현물 숏인데 마진 불가(또는 미상)면 실행 불가 → 제외
      if(marginShort && x.short.market==="spot" && x.short.margin!==true) return false;
      return true; });
  const box=$("arbCards");
  if(!rows.length){ box.innerHTML='<div class="empty">조건에 맞는 기회 없음</div>'; setStatus("stale","-"); return; }
  box.innerHTML = rows.slice(0,100).map(x=>`<div class="card">
    <div class="legs"><div class="coin clk" onclick="openCoin('${x.coin}')">${coinIcon(x.coin)}${x.coin}/USDT</div>
      ${legHtml(x.long,"long")}${legHtml(x.short,"short")}</div>
    <div class="right"><div class="gap">${x.gap_pct.toFixed(2)}%</div>
      ${x.net_gap_pct!=null?`<div class="fund">순 ${x.net_gap_pct.toFixed(2)}% (수수료 ${x.cost_pct}%)</div>`:""}
      ${fundLine(x.long)}${fundLine(x.short)}</div>
  </div>`).join("");
  $("metaInfo").textContent=`${rows.length} 전략`;
  setStatus("live","실시간");
}

function cdText(ts){ if(!ts) return ""; let s=Math.floor((ts-Date.now())/1000); if(s<0)s=0;
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`; }
const ivStr = (c)=> (c.interval_h==null ? "none" : String(c.interval_h));   // 주기 미상=none

async function renderFunding(){
  const d = await (await fetch(`/funding/matrix`)).json();
  const apy=$("apyToggle").checked, exs=d.exchanges||[];
  const fInt=$("fundInt").value, sortMode=$("fundSort").value;
  const valOf=(c)=> apy?c.apy:c.rate_pct;
  $("fundHead").innerHTML = `<th>코인</th>` + exs.map(e=>{
    const arr = fundColSort.ex===e ? ` <span class="arrow">${fundColSort.dir<0?"↓":"↑"}</span>` : "";
    return `<th class="exh" data-ex="${e}">${exDot(e)}${e}${arr}</th>`;}).join("");
  $("fundHead").querySelectorAll(".exh").forEach(th=> th.onclick=()=>{
    const e=th.dataset.ex;
    fundColSort = (fundColSort.ex===e) ? {ex:e,dir:-fundColSort.dir} : {ex:e,dir:-1};
    tick(); });
  let coins=(d.coins||[]).filter(r=>matchCoin(r.coin));
  if(fInt) coins=coins.filter(r=> Object.values(r.by_ex).some(c=>ivStr(c)===fInt));
  if(fundColSort.ex){
    const e=fundColSort.ex;
    const cv=(r)=>{ const c=r.by_ex[e]; return c?valOf(c):(fundColSort.dir<0?-Infinity:Infinity); };
    coins.sort((a,b)=> fundColSort.dir*(cv(a)-cv(b)) || 0);
  } else {
    const repr=(r)=>{ const vs=Object.values(r.by_ex).map(valOf); if(!vs.length) return 0;
      return sortMode==="abs"?Math.max(...vs.map(Math.abs)):sortMode==="asc"?Math.min(...vs):Math.max(...vs); };
    coins.sort((a,b)=> sortMode==="asc"?repr(a)-repr(b):repr(b)-repr(a));
  }
  const tb=$("fundRows");
  if(!coins.length){ tb.innerHTML=`<tr><td class="empty">조건에 맞는 코인 없음 (perp 펀비 수집 후)</td></tr>`; setStatus("stale","-"); return; }
  tb.innerHTML = coins.map(r=>{
    const cells=exs.map(ex=>{ const c=r.by_ex[ex];
      if(!c) return `<td class="num">-</td>`;
      const val=valOf(c), cls=val>=0?"pos":"neg", s=val>=0?"+":"";
      // 모든 거래소 정산주기 표시(미상이면 8H 가정 표기 '8H?')
      const ivh = c.interval_h==null ? 8 : c.interval_h;
      const iv = `<span class="cell-int">${ivh}H${c.interval_h==null?"?":""}</span>`;
      const cd=cdText(c.next_ts);
      return `<td><span class="prem ${cls}">${s}${val.toFixed(apy?2:4)}%</span>${iv}${cd?`<div class="cd">${cd}</div>`:""}</td>`;
    }).join("");
    return `<tr><td class="coin clk" onclick="openCoin('${r.coin}')">${coinLabel(r.coin)}</td>${cells}</tr>`;
  }).join("");
  $("metaInfo").textContent=`${coins.length}코인 · ${apy?"APY":"펀비"}${fInt?` · ${fInt}H`:""}`;
  setStatus("live","실시간");
}

init();
</script>

</html>
