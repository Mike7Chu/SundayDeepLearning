<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>김프 대시보드</title>
<style>
  :root {
    --bg: #0e1116; --panel: #161b22; --line: #30363d;
    --text: #e6edf3; --muted: #8b949e;
    --up: #f85149; --down: #58a6ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
  }
  header {
    position: sticky; top: 0; background: var(--panel);
    border-bottom: 1px solid var(--line); padding: 12px 16px;
  }
  h1 { margin: 0 0 8px; font-size: 16px; }
  .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  select {
    background: var(--bg); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 6px 8px; font-size: 14px;
  }
  .meta { color: var(--muted); font-size: 12px; margin-left: auto; text-align: right; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
  .live { background: #3fb950; } .stale { background: #d29922; } .err { background: var(--up); }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px 12px; text-align: right; border-bottom: 1px solid var(--line); }
  th:first-child, td:first-child { text-align: left; }
  th { color: var(--muted); font-weight: 600; font-size: 12px; position: sticky; top: 0; }
  tbody tr:hover { background: #1c2128; }
  .coin { font-weight: 700; }
  .prem { font-weight: 700; font-variant-numeric: tabular-nums; }
  .pos { color: var(--up); } .neg { color: var(--down); }
  .num { font-variant-numeric: tabular-nums; color: var(--muted); }
  .empty { padding: 40px; text-align: center; color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>🥬 김프 대시보드</h1>
  <div class="controls">
    <label>기준(국내) <select id="base"></select></label>
    <label>비교(해외) <select id="ref"></select></label>
    <div class="meta">
      <div><span id="status" class="dot err"></span><span id="statusText">연결 중…</span></div>
      <div>환율 <span id="fx">-</span> · 테더 <span id="tether">-</span> · <span id="updated">-</span></div>
    </div>
  </div>
</header>

<table>
  <thead>
    <tr>
      <th>코인</th>
      <th>김프 %(코인)</th>
      <th>국내가(KRW)</th>
      <th>해외가(KRW)</th>
    </tr>
  </thead>
  <tbody id="rows"><tr><td colspan="4" class="empty">불러오는 중…</td></tr></tbody>
</table>

<script>
const $ = (id) => document.getElementById(id);
const fmt = (n) => Number(n).toLocaleString("ko-KR", { maximumFractionDigits: 2 });

async function loadExchanges() {
  const r = await fetch("/exchanges");
  const d = await r.json();
  const fill = (sel, names, def) => {
    sel.innerHTML = "";
    names.forEach((n) => {
      const o = document.createElement("option");
      o.value = n; o.textContent = n;
      if (n === def) o.selected = true;
      sel.appendChild(o);
    });
  };
  fill($("base"), d.domestic, "upbit");
  fill($("ref"), d.overseas, "binance");
}

function setStatus(cls, text) {
  $("status").className = "dot " + cls;
  $("statusText").textContent = text;
}

function render(data) {
  const rows = (data.rows || []).slice().sort((a, b) => b.premium_coin_pct - a.premium_coin_pct);
  const tbody = $("rows");
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty">데이터 없음 (수집기 동작 확인)</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map((c) => {
    const cls = c.premium_coin_pct >= 0 ? "pos" : "neg";
    const sign = c.premium_coin_pct >= 0 ? "+" : "";
    return `<tr>
      <td class="coin">${c.coin}</td>
      <td class="prem ${cls}">${sign}${c.premium_coin_pct.toFixed(2)}%</td>
      <td class="num">${fmt(c.base_price_krw)}</td>
      <td class="num">${fmt(c.ref_price_krw)}</td>
    </tr>`;
  }).join("");
  if (rows[0]) {
    $("fx").textContent = fmt(rows[0].forex_rate);
    $("tether").textContent = fmt(rows[0].tether_rate);
    $("updated").textContent = new Date().toLocaleTimeString("ko-KR");
  }
}

async function tick() {
  const base = $("base").value, ref = $("ref").value;
  if (!base || !ref) return;
  try {
    const r = await fetch(`/premium?base=${base}&ref=${ref}`);
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    render(d);
    setStatus((d.rows && d.rows.length) ? "live" : "stale",
              (d.rows && d.rows.length) ? "실시간" : "데이터 대기");
  } catch (e) {
    setStatus("err", "오류: " + e.message);
  }
}

(async function main() {
  await loadExchanges();
  $("base").onchange = tick;
  $("ref").onchange = tick;
  await tick();
  setInterval(tick, 3000);
})();
</script>
</body>
</html>
