# 거래소 정의 + 코인 제외 규칙
# 코인은 더 이상 고정하지 않고, 각 거래소 마켓에서 동적으로 전부 수집한다.
#   - 국내(domestic): KRW 마켓
#   - 해외(overseas): USDT 마켓
# region: domestic | overseas

# 제외할 base 코인(스테이블/현금성). 김프·아비트라지 의미 없음.
exclude:
  - USDT
  - USDC
  - DAI
  - TUSD
  - BUSD
  - FDUSD
  - USDD
  - USDP
  - PYUSD

exchanges:
  upbit:
    ccxt_id: upbit
    quote: KRW
    region: domestic
  bithumb:
    ccxt_id: bithumb
    quote: KRW
    region: domestic
  binance:
    ccxt_id: binance
    quote: USDT
    region: overseas
  bybit:
    ccxt_id: bybit
    quote: USDT
    region: overseas
    options:
      defaultType: spot   # bybit는 현물 카테고리 명시 안 하면 fetch_tickers가 0개 반환
  mexc:
    ccxt_id: mexc
    quote: USDT
    region: overseas
  bitget:
    ccxt_id: bitget
    quote: USDT
    region: overseas
  gate:
    ccxt_id: gate
    quote: USDT
    region: overseas
  bingx:
    ccxt_id: bingx
    quote: USDT
    region: overseas
  okx:
    ccxt_id: okx
    quote: USDT
    region: overseas
